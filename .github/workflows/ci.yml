name: VELORA CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend-check:
    name: Frontend Compile & Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Modules
        run: npm ci

      - name: Run Next.js Production Build
        run: npm run build

  backend-check:
    name: Backend Lint & Compile Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check Backend Syntax Compilation
        run: |
          python -m py_compile backend/app/main.py
          python -m py_compile backend/app/services/ai_service.py

      - name: Run Python API Unit Tests
        run: |
          cd backend
          python -m unittest discover tests/
